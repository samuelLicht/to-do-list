<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List | Samuel Licht</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">

    <header class="header">
      <h1>📝 Mi Lista de Tareas</h1>
      <p>Organiza tu día, una tarea a la vez.</p>
    </header>

    <div class="input-area">
      <input
        type="text"
        id="task-input"
        placeholder="Escribe una tarea..."
        maxlength="100"
      />
      <button id="add-btn">+ Agregar</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Todas</button>
      <button class="filter-btn" data-filter="pending">Pendientes</button>
      <button class="filter-btn" data-filter="completed">Completadas</button>
    </div>

    <ul id="task-list"></ul>

    <footer class="footer">
      <span id="task-count">0 tareas pendientes</span>
      <button id="clear-btn">Limpiar completadas</button>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
